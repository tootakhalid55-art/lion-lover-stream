name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bunx tsgo --noEmit
      - name: Unit tests
        run: bunx vitest run
      - name: Security scan (deps)
        run: bun audit --production || true
      - name: Build
        run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: .output/
          retention-days: 14

  migrations:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Validate migrations
        run: bash scripts/migrations-check.sh

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    needs: [build, migrations]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-${{ github.sha }}, path: .output/ }
      - name: Deploy
        run: bash scripts/deploy.sh staging
      - name: Smoke tests
        run: bash scripts/smoke.sh https://staging.nova-tv.app

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://tv.canarmodern.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-${{ github.sha }}, path: .output/ }
      - name: Deploy
        run: bash scripts/deploy.sh production
      - name: Smoke tests
        run: bash scripts/smoke.sh https://tv.canarmodern.com
